[package]
name = "chubby_bunny_playground"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
chubby_bunny = { path = "../chubby_bunny" }
nalgebra = "0.35"
itertools = "0.14"
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
web-sys = { version = "0.3", features = ["Window", "Performance","console"] }